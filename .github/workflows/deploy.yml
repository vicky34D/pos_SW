name: Deploy to OCI (Docker)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USER }}
          key: ${{ secrets.OCI_KEY }}
          script: |
            set -e
            
            echo "=== Pulling latest code ==="
            cd ~/pos_SW
            git pull origin main
            
            echo "=== Cleaning up existing containers ==="
            # Forcefully remove the specific container if it exists to avoid naming conflicts
            docker rm -f streetwok-pos || true
            
            # Also try normal compose down
            docker compose down || true
            
            echo "=== Building and Running with Docker ==="
            export VITE_GOOGLE_CLIENT_ID="${{ secrets.VITE_GOOGLE_CLIENT_ID }}"
            
            # Build and start with explicit project name to be safe
            VITE_GOOGLE_CLIENT_ID=$VITE_GOOGLE_CLIENT_ID docker compose -p streetwok up -d --build
            
            echo "=== Deployment Status ==="
            docker compose -p streetwok ps
            
            echo "=== Cleanup old images ==="
            docker image prune -f
            
            echo "=== Deploy Complete ==="
