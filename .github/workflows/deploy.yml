name: Deploy to OCI (Docker)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USER }}
          key: ${{ secrets.OCI_KEY }}
          script: |
            set -e
            
            echo "=== Pulling latest code ==="
            cd ~/pos_SW
            git pull origin main
            
            echo "=== Building and Running with Docker ==="
            # We pass the Google Client ID as a build argument
            export VITE_GOOGLE_CLIENT_ID="${{ secrets.VITE_GOOGLE_CLIENT_ID }}"
            
            # Stop existing container if any
            docker compose down || true
            
            # Build and start
            VITE_GOOGLE_CLIENT_ID=$VITE_GOOGLE_CLIENT_ID docker compose up -d --build
            
            echo "=== Deployment Status ==="
            docker compose ps
            
            echo "=== Cleanup old images ==="
            docker image prune -f
            
            echo "=== Deploy Complete ==="
